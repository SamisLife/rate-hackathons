databases:
  - name: rate-hackathons-db
    databaseName: rate_hackathons
    plan: free

services:
  - type: web
    name: rate-hackathons-backend
    runtime: go
    rootDir: backend/devpost
    buildCommand: go build -o server .
    startCommand: ./server
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rate-hackathons-db
          property: connectionString
      - key: ALLOWED_ORIGIN
        value: https://rate-hackathons-frontend.onrender.com
      - key: PORT
        value: "8080"

  - type: web
    name: rate-hackathons-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rate-hackathons-db
          property: connectionString
      - key: GO_BASE_URL
        value: https://rate-hackathons-backend.onrender.com
      - key: NODE_ENV
        value: production